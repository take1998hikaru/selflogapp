<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Self Care Log</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-type="module">
// ═══════════════════════════════════════════
//  Storage Layer
// ═══════════════════════════════════════════
const KEYS = {
  logs: 'selfcare_logs',
  diary: 'selfcare_diary',
  todos: 'selfcare_todos',
  weather: 'selfcare_weather',
  streak: 'selfcare_streak',
  schedule: 'selfcare_schedule',
  murmurs: 'selfcare_murmurs',
};

// ── Gist同期設定 ──
const SYNC_TOKEN_KEY = 'selfcare_sync_token';
const SYNC_GIST_KEY = 'selfcare_sync_gist_id';
const SYNC_LAST_KEY = 'selfcare_sync_last';
const GIST_FILENAME = 'selfcare_log_data.json';

function getSyncToken() { return localStorage.getItem(SYNC_TOKEN_KEY) || ''; }
function setSyncToken(t) { localStorage.setItem(SYNC_TOKEN_KEY, t); }
function getSyncGistId() { return localStorage.getItem(SYNC_GIST_KEY) || ''; }
function setSyncGistId(id) { localStorage.setItem(SYNC_GIST_KEY, id); }
function getLastSyncTime() { return localStorage.getItem(SYNC_LAST_KEY) || ''; }
function setLastSyncTime() { localStorage.setItem(SYNC_LAST_KEY, new Date().toISOString()); }

let _syncTimer = null;

function _get(key) {
  try { return JSON.parse(localStorage.getItem(key)) || []; }
  catch { return []; }
}
let _serverTimer = null;
function _set(key, data) {
  localStorage.setItem(key, JSON.stringify(data));
  // サーバーにも保存（1秒デバウンス）
  if (_serverTimer) clearTimeout(_serverTimer);
  _serverTimer = setTimeout(() => {
    _serverTimer = null;
    fetch('/api/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ type: key, data }),
    }).catch(() => {});  // オフライン時は無視
  }, 1000);
  // 毎回保存時にGist同期（1秒デバウンス：連続保存をまとめる）
  if (getSyncToken()) {
    if (_syncTimer) clearTimeout(_syncTimer);
    _syncTimer = setTimeout(() => {
      _syncTimer = null;
      updateSyncBar('syncing');
      syncToGist((err) => {
        updateSyncBar(err ? 'error' : 'ok');
      });
    }, 1000);
  }
}

// ── 同期バー表示制御 ──
function updateSyncBar(state) {
  const bar = document.getElementById('syncBar');
  if (!bar) return;
  const token = getSyncToken();
  if (!token) { bar.style.display = 'none'; return; }
  bar.style.display = 'flex';
  const dot = bar.querySelector('.sync-dot-icon');
  const text = bar.querySelector('.sync-text');
  const icon = bar.querySelector('.sync-refresh-icon');
  if (state === 'syncing') {
    bar.className = 'sync-bar syncing';
    if (dot) dot.style.background = 'var(--blue)';
    if (text) text.textContent = '同期中...';
    if (icon) icon.style.animation = 'spin 1s linear infinite';
  } else if (state === 'error') {
    bar.className = 'sync-bar error';
    if (dot) dot.style.background = 'var(--red)';
    if (text) text.textContent = '同期エラー';
    if (icon) icon.style.animation = '';
    setTimeout(() => updateSyncBar('ok'), 3000);
  } else {
    bar.className = 'sync-bar';
    if (dot) dot.style.background = 'var(--accent)';
    const last = getLastSyncTime();
    if (last) {
      const d = new Date(last);
      const mm = String(d.getMonth()+1).padStart(2,'0');
      const dd = String(d.getDate()).padStart(2,'0');
      const hh = String(d.getHours()).padStart(2,'0');
      const mi = String(d.getMinutes()).padStart(2,'0');
      if (text) text.textContent = '同期済み（' + mm + '/' + dd + ' ' + hh + ':' + mi + '）';
    } else {
      if (text) text.textContent = '未同期';
    }
    if (icon) icon.style.animation = '';
  }
}

function onSyncBarTap() {
  const token = getSyncToken();
  if (!token) return;
  updateSyncBar('syncing');
  syncToGist((err) => {
    updateSyncBar(err ? 'error' : 'ok');
  });
}

// ── Gist同期関数 ──
function _getAllLocalData() {
  return {
    logs: _get(KEYS.logs),
    diary: _get(KEYS.diary),
    todos: _get(KEYS.todos),
    weather: _get(KEYS.weather),
    murmurs: _get(KEYS.murmurs),
    streak: (() => { try { return JSON.parse(localStorage.getItem(KEYS.streak)) || {}; } catch { return {}; } })(),
  };
}

function _mergeData(local, remote) {
  // Logs: merge by date+type, take newer updatedAt
  const mergedLogs = [...local.logs];
  (remote.logs || []).forEach(r => {
    const idx = mergedLogs.findIndex(l => l.date === r.date && l.type === r.type);
    if (idx < 0) mergedLogs.push(r);
    else if ((r.updatedAt || r.createdAt || '') > (mergedLogs[idx].updatedAt || mergedLogs[idx].createdAt || '')) mergedLogs[idx] = r;
  });

  // Diary: merge by date, take newer
  const mergedDiary = [...local.diary];
  (remote.diary || []).forEach(r => {
    const idx = mergedDiary.findIndex(d => d.date === r.date);
    if (idx < 0) mergedDiary.push(r);
    else if ((r.updatedAt || r.createdAt || '') > (mergedDiary[idx].updatedAt || mergedDiary[idx].createdAt || '')) mergedDiary[idx] = r;
  });

  // Todos: merge by id, take newer
  const mergedTodos = [...local.todos];
  (remote.todos || []).forEach(r => {
    const idx = mergedTodos.findIndex(t => t.id === r.id);
    if (idx < 0) mergedTodos.push(r);
    else if ((r.createdAt || '') > (mergedTodos[idx].createdAt || '')) mergedTodos[idx] = r;
  });

  // Murmurs: merge by id, take newer (updatedAt > deletedAt > createdAt)
  function _murmurTs(m) { return m.deletedAt || m.updatedAt || m.createdAt || ''; }
  const mergedMurmurs = [...(local.murmurs || [])];
  (remote.murmurs || []).forEach(r => {
    const idx = mergedMurmurs.findIndex(m => m.id === r.id);
    if (idx < 0) mergedMurmurs.push(r);
    else if (_murmurTs(r) > _murmurTs(mergedMurmurs[idx])) mergedMurmurs[idx] = r;
  });

  // Streak: take higher count
  const mergedStreak = (local.streak?.count || 0) >= (remote.streak?.count || 0) ? (local.streak || {}) : (remote.streak || {});

  return { logs: mergedLogs, diary: mergedDiary, todos: mergedTodos, murmurs: mergedMurmurs, weather: local.weather || [], streak: mergedStreak };
}

function _applyData(data) {
  localStorage.setItem(KEYS.logs, JSON.stringify(data.logs || []));
  localStorage.setItem(KEYS.diary, JSON.stringify(data.diary || []));
  localStorage.setItem(KEYS.todos, JSON.stringify(data.todos || []));
  localStorage.setItem(KEYS.murmurs, JSON.stringify(data.murmurs || []));
  if (data.streak) localStorage.setItem(KEYS.streak, JSON.stringify(data.streak));
}

function syncToGist(callback) {
  const token = getSyncToken();
  if (!token) { if (callback) callback('トークン未設定'); return; }

  const gistId = getSyncGistId();
  const localData = _getAllLocalData();

  if (!gistId) {
    fetch('https://api.github.com/gists', {
      method: 'POST',
      headers: { 'Authorization': 'token ' + token, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        description: 'Self Care Log データ',
        public: false,
        files: { [GIST_FILENAME]: { content: JSON.stringify(localData) } }
      })
    }).then(res => {
      if (!res.ok) throw new Error('Gist作成失敗: ' + res.status);
      return res.json();
    }).then(data => {
      setSyncGistId(data.id);
      setLastSyncTime();
      if (callback) callback(null, 'Gist作成完了');
    }).catch(e => { if (callback) callback(e.message); });
  } else {
    fetch('https://api.github.com/gists/' + gistId, {
      headers: { 'Authorization': 'token ' + token }
    }).then(res => {
      if (!res.ok) throw new Error('Gist取得失敗: ' + res.status);
      return res.json();
    }).then(data => {
      let remoteData = {};
      try {
        const file = data.files[GIST_FILENAME];
        if (file) remoteData = JSON.parse(file.content);
      } catch(e) {}

      const merged = _mergeData(localData, remoteData);
      _applyData(merged);

      return fetch('https://api.github.com/gists/' + gistId, {
        method: 'PATCH',
        headers: { 'Authorization': 'token ' + token, 'Content-Type': 'application/json' },
        body: JSON.stringify({
          files: { [GIST_FILENAME]: { content: JSON.stringify(merged) } }
        })
      });
    }).then(res => {
      if (!res.ok) throw new Error('Gist更新失敗: ' + res.status);
      setLastSyncTime();
      if (callback) callback(null, '同期完了');
    }).catch(e => { if (callback) callback(e.message); });
  }
}

function connectSync(token) {
  return new Promise((resolve, reject) => {
    fetch('https://api.github.com/user', {
      headers: { 'Authorization': 'token ' + token }
    }).then(res => {
      if (!res.ok) throw new Error('無効なトークンです');
      return res.json();
    }).then(() => {
      setSyncToken(token);
      return fetch('https://api.github.com/gists?per_page=100', {
        headers: { 'Authorization': 'token ' + token }
      });
    }).then(res => {
      if (!res.ok) throw new Error('Gist一覧取得失敗');
      return res.json();
    }).then(gists => {
      const found = gists.find(g => g.files && g.files[GIST_FILENAME]);
      if (found) setSyncGistId(found.id);
      syncToGist((err, msg) => {
        if (err) reject(err);
        else resolve(msg);
      });
    }).catch(e => reject(e.message));
  });
}

function disconnectSync() {
  localStorage.removeItem(SYNC_TOKEN_KEY);
  localStorage.removeItem(SYNC_GIST_KEY);
  localStorage.removeItem(SYNC_LAST_KEY);
}

const DB = {
  _pad(n) { return n < 10 ? '0' + n : '' + n; },
  _toDateStr(d) { return d.getFullYear() + '-' + DB._pad(d.getMonth()+1) + '-' + DB._pad(d.getDate()); },

  today() { return DB._toDateStr(new Date()); },

  formatDate(dateStr) {
    const d = new Date(dateStr + 'T00:00:00');
    const days = ['日','月','火','水','木','金','土'];
    return `${d.getMonth()+1}/${d.getDate()}（${days[d.getDay()]}）`;
  },

  shiftDate(dateStr, days) {
    const d = new Date(dateStr + 'T00:00:00');
    d.setDate(d.getDate() + days);
    return DB._toDateStr(d);
  },

  // ── Logs ──
  getLogs()         { return _get(KEYS.logs); },
  getLogByDate(date, type) { return _get(KEYS.logs).find(l => l.date === date && l.type === type) || null; },
  saveLog(entry) {
    const logs = _get(KEYS.logs);
    const idx = logs.findIndex(l => l.date === entry.date && l.type === entry.type);
    if (idx >= 0) logs[idx] = { ...logs[idx], ...entry, updatedAt: new Date().toISOString() };
    else logs.push({ ...entry, createdAt: new Date().toISOString() });
    _set(KEYS.logs, logs);
    if (entry.date === DB.today()) DB.updateStreak();
  },

  // ── Diary ──
  getDiaries()          { return _get(KEYS.diary); },
  getDiaryByDate(date)  { return _get(KEYS.diary).find(d => d.date === date) || null; },
  saveDiary(entry) {
    const diaries = _get(KEYS.diary);
    const idx = diaries.findIndex(d => d.date === entry.date);
    if (idx >= 0) diaries[idx] = { ...diaries[idx], ...entry, updatedAt: new Date().toISOString() };
    else diaries.push({ ...entry, createdAt: new Date().toISOString() });
    _set(KEYS.diary, diaries);
  },

  // ── Todos ──
  getTodos() {
    const todos = _get(KEYS.todos);
    let migrated = false;
    todos.forEach(t => {
      if (t.done !== undefined && !t.status) {
        t.status = t.done ? 'done' : 'todo';
        delete t.done;
        migrated = true;
      }
      if (!t.status) { t.status = 'todo'; migrated = true; }
      if (!t.priority) { t.priority = 'medium'; migrated = true; }
      if (!t.type) { t.type = 'habit'; migrated = true; }
      if (!t.dueDate && t.type === 'event') { t.dueDate = t.date || DB.today(); migrated = true; }
    });
    if (migrated) _set(KEYS.todos, todos);
    return todos;
  },
  saveTodo(todo) {
    const todos = DB.getTodos();
    if (todo.id) {
      const idx = todos.findIndex(t => t.id === todo.id);
      if (idx >= 0) todos[idx] = { ...todos[idx], ...todo };
    } else {
      todo.id = Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
      todo.createdAt = new Date().toISOString();
      todo.status = todo.status || 'todo';
      todo.priority = todo.priority || 'medium';
      todo.type = todo.type || 'habit';
      todo.memo = todo.memo || '';
      if (todo.type === 'event') todo.dueDate = todo.dueDate || DB.today();
      todos.push(todo);
    }
    _set(KEYS.todos, todos);
    return todo;
  },
  deleteTodo(id) { _set(KEYS.todos, _get(KEYS.todos).filter(t => t.id !== id)); },
  cycleTodoStatus(id) {
    const todos = DB.getTodos();
    const t = todos.find(t => t.id === id);
    if (t) {
      const cycle = { todo: 'doing', doing: 'done', done: 'todo' };
      t.status = cycle[t.status] || 'todo';
    }
    _set(KEYS.todos, todos);
    return t;
  },

  // ── Weather ──
  getWeatherByDate(date) { return _get(KEYS.weather).find(w => w.date === date) || null; },
  saveWeather(entry) {
    const data = _get(KEYS.weather);
    const idx = data.findIndex(w => w.date === entry.date);
    if (idx >= 0) data[idx] = { ...data[idx], ...entry };
    else data.push(entry);
    _set(KEYS.weather, data);
  },

  // ── Streak ──
  getStreak() {
    try { return JSON.parse(localStorage.getItem(KEYS.streak)) || { count: 0, lastDate: '' }; }
    catch { return { count: 0, lastDate: '' }; }
  },
  updateStreak() {
    const streak = DB.getStreak();
    const t = DB.today();
    const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
    if (streak.lastDate === t) return streak;
    streak.count = (streak.lastDate === yesterday) ? streak.count + 1 : 1;
    streak.lastDate = t;
    localStorage.setItem(KEYS.streak, JSON.stringify(streak));
    return streak;
  },

  // ── Murmurs (つぶやき) ──
  _localNow() {
    const now = new Date();
    return now.getFullYear() + '-' + DB._pad(now.getMonth()+1) + '-' + DB._pad(now.getDate())
      + 'T' + DB._pad(now.getHours()) + ':' + DB._pad(now.getMinutes()) + ':' + DB._pad(now.getSeconds());
  },
  getMurmurs() { return _get(KEYS.murmurs).filter(m => !m.deleted); },
  getMurmursByDate(date) {
    return _get(KEYS.murmurs).filter(m => !m.deleted && (m.createdAt || '').startsWith(date));
  },
  saveMurmur(entry) {
    const murmurs = _get(KEYS.murmurs);
    if (!entry.id) {
      entry.id = Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
      entry.createdAt = DB._localNow();
    }
    murmurs.unshift(entry);
    _set(KEYS.murmurs, murmurs);
    return entry;
  },
  updateMurmur(id, updates) {
    const murmurs = _get(KEYS.murmurs);
    const idx = murmurs.findIndex(m => m.id === id);
    if (idx >= 0) {
      murmurs[idx] = { ...murmurs[idx], ...updates, updatedAt: DB._localNow() };
      _set(KEYS.murmurs, murmurs);
    }
  },
  deleteMurmur(id) {
    // ソフトデリート: deleted フラグを立てる（同期時に復活しない）
    const murmurs = _get(KEYS.murmurs);
    const idx = murmurs.findIndex(m => m.id === id);
    if (idx >= 0) {
      murmurs[idx].deleted = true;
      murmurs[idx].deletedAt = DB._localNow();
      _set(KEYS.murmurs, murmurs);
    }
  },
  getAllMurmurTags() {
    const tags = new Set();
    _get(KEYS.murmurs).filter(m => !m.deleted).forEach(m => (m.tags || []).forEach(t => tags.add(t)));
    return [...tags].sort();
  },

  getAllDates() {
    const dates = new Set();
    _get(KEYS.logs).forEach(l => dates.add(l.date));
    _get(KEYS.diary).forEach(d => dates.add(d.date));
    _get(KEYS.murmurs).forEach(m => { const d = (m.createdAt||'').slice(0,10); if(d) dates.add(d); });
    return [...dates].sort().reverse();
  },

  // ── CSV エクスポート ──
  exportCSV() {
    const logs = _get(KEYS.logs);
    const todos = _get(KEYS.todos);
    const diaries = _get(KEYS.diary);

    function esc(v) {
      if (v == null) return '';
      const s = String(v);
      return s.includes(',') || s.includes('"') || s.includes('\n')
        ? '"' + s.replace(/"/g, '""') + '"' : s;
    }
    function row(...cells) { return cells.map(esc).join(','); }

    const lines = [];

    // 朝ログ
    lines.push('## 朝ログ');
    lines.push(row('日付','起床時間','気分','体調','睡眠の質','朝活','朝活内容','メモ'));
    logs.filter(l => l.type === 'morning').sort((a,b) => a.date.localeCompare(b.date)).forEach(l => {
      lines.push(row(l.date, l.wakeTime, l.mood, l.bodyCondition, l.sleepQuality,
        l.morningActivity === 'yes' ? 'やった' : l.morningActivity === 'no' ? 'できなかった' : '',
        l.morningActivityNote, l.morningNote));
    });

    lines.push('');
    // 夜ログ
    lines.push('## 夜ログ');
    lines.push(row('日付','就寝予定','気分','運動','運動内容','明日の最優先タスク','感謝・よかったこと','振り返り'));
    logs.filter(l => l.type === 'night').sort((a,b) => a.date.localeCompare(b.date)).forEach(l => {
      lines.push(row(l.date, l.bedTime, l.mood,
        l.exerciseDone === 'yes' ? 'やった' : l.exerciseDone === 'no' ? '休み' : '',
        l.exercise, l.tomorrowGoal, l.gratitude, l.reflection));
    });

    lines.push('');
    // Todo
    lines.push('## Todo');
    lines.push(row('タスク名','重要度','期限','状態','メモ','作成日'));
    const prioLabel = { high: '高', medium: '中', low: '低' };
    const statusLabel = { todo: '未着手', doing: '進行中', done: '完了' };
    todos.sort((a,b) => (a.dueDate||'').localeCompare(b.dueDate||'')).forEach(t => {
      lines.push(row(t.text, prioLabel[t.priority]||t.priority, t.dueDate,
        statusLabel[t.status]||t.status, t.memo, t.createdAt?.slice(0,10)));
    });

    lines.push('');
    // 日記
    lines.push('## 日記');
    lines.push(row('日付','内容'));
    diaries.sort((a,b) => a.date.localeCompare(b.date)).forEach(d => {
      lines.push(row(d.date, d.content));
    });

    lines.push('');
    // つぶやき
    const murmurs = _get(KEYS.murmurs);
    lines.push('## つぶやき');
    lines.push(row('日時','内容','気分','タグ'));
    murmurs.filter(m => !m.deleted).sort((a,b) => (a.createdAt||'').localeCompare(b.createdAt||'')).forEach(m => {
      lines.push(row(m.createdAt, m.text, m.mood, (m.tags||[]).join(' ')));
    });

    const csv = '\uFEFF' + lines.join('\r\n'); // BOM付きUTF-8
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `selfcare_log_${DB.today()}.csv`;
    a.click();
    URL.revokeObjectURL(url);
  },

  // ── Gistから同期（起動時）──
  async initFromGist() {
    const token = getSyncToken();
    const gistId = getSyncGistId();
    if (!token || !gistId) return;

    try {
      const res = await fetch('https://api.github.com/gists/' + gistId, {
        headers: { 'Authorization': 'token ' + token }
      });
      if (!res.ok) return;
      const gist = await res.json();
      const file = gist.files[GIST_FILENAME];
      if (!file) return;
      const remoteData = JSON.parse(file.content);
      const localData = _getAllLocalData();
      const merged = _mergeData(localData, remoteData);
      _applyData(merged);
      setLastSyncTime();
    } catch (_) { /* オフライン時はlocalStorageのみで動作 */ }
  },

  // ── 朝活の統計 ──
  getMorningActivityStats() {
    const logs = _get(KEYS.logs).filter(l => l.type === 'morning' && l.morningActivity === 'yes');
    const totalDays = logs.length;

    // 連続日数を計算
    if (totalDays === 0) return { totalDays: 0, streakDays: 0 };

    const dates = logs.map(l => l.date).sort().reverse();
    let streakDays = 0;
    let checkDate = DB.today();

    // 今日の朝ログがあるかチェック
    const todayLog = _get(KEYS.logs).find(l => l.type === 'morning' && l.date === checkDate);
    if (!todayLog || todayLog.morningActivity !== 'yes') {
      // 今日まだやってなければ昨日から数える
      checkDate = DB.shiftDate(checkDate, -1);
    }

    for (let i = 0; i < 365; i++) {
      const hasActivity = dates.includes(checkDate);
      if (hasActivity) {
        streakDays++;
        checkDate = DB.shiftDate(checkDate, -1);
      } else {
        break;
      }
    }

    return { totalDays, streakDays };
  },

  // ── 今日の優先順位 ──
  getTodayPriorityCats() {
    const today = DB.today();
    const yesterday = DB.shiftDate(today, -1);
    const lastNight = DB.getLogByDate(yesterday, 'night');
    // 今日チェックしたものは done でも表示する
    const checkedToday = (() => {
      try {
        const stored = JSON.parse(localStorage.getItem('selfcare_priority_checked'));
        if (stored && stored.date === today) return stored.items;
        return {};
      } catch { return {}; }
    })();
    const todos = DB.getTodos().filter(t => t.status !== 'done' || checkedToday[t.id]);
    const doy = Math.floor((new Date() - new Date(new Date().getFullYear(), 0, 0)) / 86400000);

    const impMap = { high: 3, medium: 2, low: 1 };
    function score(t) {
      if (!t.dueDate) return (impMap[t.priority] || 2) * 10;
      const diff = Math.ceil((new Date(t.dueDate + 'T00:00:00') - new Date(today + 'T00:00:00')) / 86400000);
      const urg = diff <= 0 ? 5 : diff <= 1 ? 4 : diff <= 3 ? 3 : diff <= 7 ? 2 : 1;
      return (impMap[t.priority] || 2) * urg * 10;
    }

    const mustItems = [];
    const shouldItems = [];
    const couldItems = [];

    // 1. must: 昨夜の目標（すべて）
    if (lastNight?.tomorrowGoal) {
      mustItems.push({
        text: lastNight.tomorrowGoal, note: '昨夜に設定した目標',
        type: 'goal', source: 'nightLog', cat: 'must', score: 9999,
        todoType: null,
      });
    }

    // 2. must: 今日が期限のイベントTodo（すべて）
    todos.filter(t => t.type === 'event' && t.dueDate === today).forEach(t => {
      mustItems.push({ text: t.text, note: t.memo || '', type: 'todo', source: 'todo', id: t.id, cat: 'must', score: score(t), todoType: 'event', dueDate: t.dueDate });
    });

    // 3. should: 習慣Todo スコア高い順 最大2件（mustと重複するテキストは除外）
    const mustTexts = new Set(mustItems.map(i => i.text.trim()));
    const habitTodos = todos
      .filter(t => t.type === 'habit' && !mustTexts.has(t.text.trim()))
      .map(t => ({ text: t.text, note: t.memo || '', type: 'todo', source: 'todo', id: t.id, cat: 'should', score: score(t), todoType: 'habit' }))
      .sort((a, b) => b.score - a.score);
    shouldItems.push(...habitTodos.slice(0, 2));

    // 4. should が2件未満なら AI習慣提案で補充
    const habitPool = [
      { text: '養老孟司の本を3ページだけ読む', note: 'たった3ページでも習慣になる' },
      { text: 'ハムストリングスを30秒×2セット伸ばす', note: 'デスクワーク後の張りをほぐす' },
      { text: '今日のタンパク質源を1つ確認する', note: '鶏むね・卵・豆腐など意識するだけでOK' },
      { text: '好きな世界史の動画を1本だけ見る（10分以内）', note: '好奇心を満たす小さな学習' },
      { text: '政治経済ニュースを10分だけ読む', note: '日銀・為替・インフレ動向を把握' },
      { text: '資産形成で気づいたことを1行メモする', note: 'スマホのメモアプリでOK' },
    ];
    if (shouldItems.length < 2) {
      shouldItems.push({
        text: habitPool[doy % habitPool.length].text,
        note: habitPool[doy % habitPool.length].note,
        type: 'suggest', source: 'habit', cat: 'should', score: 35, todoType: null,
      });
    }

    // 5. could: 期限切れ/低優先Todoイベント + AI提案 最大3件
    todos
      .filter(t => t.type === 'event' && t.dueDate !== today)
      .sort((a, b) => score(b) - score(a))
      .slice(0, 2)
      .forEach(t => couldItems.push({ text: t.text, note: t.memo || '', type: 'todo', source: 'todo', id: t.id, cat: 'could', score: score(t), todoType: 'event', dueDate: t.dueDate }));

    const couldPool = [
      { text: '行きたい場所を1つだけ検索する', note: '旅の妄想が気分転換になる' },
      { text: '今月の支出を1項目だけ見直す', note: 'コンビニ代・サブスク等を確認' },
      { text: '今夜だけ好きなゲームを30分楽しむ', note: 'ご褒美タイムで継続モチベを維持' },
      { text: '図書館・Amazonで気になる本を1冊調べる', note: 'タイトルをメモするだけでOK' },
      { text: '明朝着る服を今夜セットしておく', note: '朝の選択肢を1つ減らす' },
      { text: '好きな曲を1曲だけかけてぼーっとする', note: '5分のリセットタイム' },
      { text: '引き出しやデスク周りを5分だけ整える', note: '小さな整理で気持ちもスッキリ' },
      { text: '近所を10分だけ散歩する', note: '外の空気が思考をクリアにする' },
      { text: '好きなYouTubeを1本だけ見る（15分以内）', note: 'ダラ見しないための時間制限つき' },
      { text: '今週うまくいったことを1つ思い出す', note: '自分をほめる習慣が自己肯定感に' },
      { text: '体重・体調を一言だけメモする', note: '記録は振り返りの材料になる' },
      { text: '寝る前に明日やることを1つだけ決める', note: '朝の迷いがゼロになる' },
    ];
    const remaining = 3 - couldItems.length;
    for (let k = 0; k < remaining; k++) {
      const c = couldPool[(doy + k * 4) % couldPool.length];
      couldItems.push({ text: c.text, note: c.note, type: 'suggest', source: 'ai', cat: 'could', score: 10 - k, todoType: null });
    }

    const catColor = { must: 'red', should: 'gold', could: 'green' };
    const result = [
      ...mustItems.map(item => ({ ...item, label: '最優先', dot: catColor.must })),
      ...shouldItems.map(item => ({ ...item, label: 'できればやる', dot: catColor.should })),
      ...couldItems.slice(0, 3).map(item => ({ ...item, label: '余裕があれば', dot: catColor.could })),
    ];
    return result;
  },

  // ── 旧: 今日やること (Home用) ──
  getTodayPriorities() {
    const today = DB.today();
    const items = [];

    // 1. 昨晩の夜ログ「明日の最優先タスク」
    const yesterday = DB.shiftDate(today, -1);
    const lastNight = DB.getLogByDate(yesterday, 'night');
    if (lastNight?.tomorrowGoal) {
      items.push({ text: lastNight.tomorrowGoal, type: 'goal', priority: 'high', sortScore: 300 });
    }

    // 2. Todos (未完了)
    const todos = DB.getTodos().filter(t => t.status !== 'done');
    const prioScore = { high: 80, medium: 50, low: 20 };
    todos.forEach(t => {
      const isOverdue = t.dueDate && t.dueDate <= today;
      const isDoing = t.status === 'doing';
      const daysUntilDue = t.dueDate ? Math.floor((new Date(t.dueDate + 'T00:00:00') - new Date(today + 'T00:00:00')) / 86400000) : 999;
      const dueSoon = daysUntilDue <= 2 ? 40 : 0;
      items.push({
        text: t.text, type: 'todo', priority: t.priority, status: t.status, id: t.id,
        sortScore: (prioScore[t.priority]||0) + (isDoing ? 30 : 0) + (isOverdue ? 60 : 0) + dueSoon,
      });
    });

    items.sort((a, b) => b.sortScore - a.sortScore);
    return items.slice(0, 3);
  },
};

// ═══════════════════════════════════════════
//  XP / レベルシステム
// ═══════════════════════════════════════════
// 朝活+両ログ=40XP/日 × 30日 = 1200XP でバラモス討伐
const XP_LEVELS = [0, 50, 130, 250, 400, 580, 780, 980, 1100, 1200, 9999999];
const LEVEL_NAMES = ['旅の者','見習い冒険者','冒険者','勇者の卵','若き勇者','熟練の戦士','勇者','超戦士','伝説の勇者','⚔️バラモス討伐！'];

function calcXP() {
  const logs = _get(KEYS.logs);
  let xp = 0;
  logs.forEach(l => {
    if (l.type === 'morning') {
      xp += 10;
      if (l.morningActivity === 'yes') xp += 20;
    }
    if (l.type === 'night') {
      xp += 10;
      if (l.exerciseDone === 'yes') xp += 20;
    }
  });
  return xp;
}

function getLevel(xp) {
  let lv = 1;
  for (let i = 1; i < XP_LEVELS.length; i++) {
    if (xp >= XP_LEVELS[i]) lv = i + 1; else break;
  }
  return Math.min(lv, XP_LEVELS.length - 1);
}

function getLevelProgress(xp) {
  const lv = getLevel(xp);
  const base = XP_LEVELS[lv - 1];
  const next = XP_LEVELS[lv] || XP_LEVELS[lv - 1];
  const pct = next === base ? 100 : Math.round(((xp - base) / (next - base)) * 100);
  return { lv, xp, base, next, pct, name: LEVEL_NAMES[Math.min(lv - 1, LEVEL_NAMES.length - 1)] };
}

// ═══════════════════════════════════════════
//  Weather API (今日+明日の予報)
// ═══════════════════════════════════════════
async function fetchWeatherForecast() {
  try {
    const url = 'https://api.open-meteo.com/v1/forecast?latitude=34.6937&longitude=135.5023'
      + '&current=temperature_2m,relative_humidity_2m,weather_code,apparent_temperature,wind_speed_10m'
      + '&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max'
      + '&hourly=precipitation_probability'
      + '&timezone=Asia%2FTokyo&forecast_days=2';
    const res = await fetch(url);
    const data = await res.json();
    const c = data.current;
    const d = data.daily;
    const h = data.hourly;

    const codeMap = { 0:'快晴',1:'晴れ',2:'くもり',3:'曇天',45:'霧',48:'霧氷',51:'小雨',53:'雨',55:'強い雨',61:'小雨',63:'雨',65:'大雨',71:'小雪',73:'雪',75:'大雪',80:'にわか雨',81:'にわか雨',82:'豪雨',95:'雷雨',96:'雷雨(雹)' };
    const emojiMap = (code) => code<=1?'☀️':code<=3?'☁️':code<=48?'🌫️':code<=55?'🌦️':code<=65?'🌧️':code<=75?'❄️':code<=82?'🌧️':'⛈️';

    // 時間別降水確率から午前(6-12時)・午後(12-18時)を計算
    function getPrecipAMPM(dayIndex) {
      const baseHour = dayIndex * 24;
      const amHours = h.precipitation_probability.slice(baseHour + 6, baseHour + 12);
      const pmHours = h.precipitation_probability.slice(baseHour + 12, baseHour + 18);
      const amMax = amHours.length > 0 ? Math.max(...amHours) : 0;
      const pmMax = pmHours.length > 0 ? Math.max(...pmHours) : 0;
      return { am: amMax, pm: pmMax };
    }

    const todayPrecip = getPrecipAMPM(0);
    const tomorrowPrecip = getPrecipAMPM(1);

    const forecast = {
      date: DB.today(),
      current: {
        temp: c.temperature_2m, humidity: c.relative_humidity_2m,
        feelsLike: c.apparent_temperature, windSpeed: c.wind_speed_10m,
        code: c.weather_code, description: codeMap[c.weather_code]||'不明',
        emoji: emojiMap(c.weather_code),
      },
      today: {
        code: d.weather_code[0], description: codeMap[d.weather_code[0]]||'不明',
        emoji: emojiMap(d.weather_code[0]),
        high: d.temperature_2m_max[0], low: d.temperature_2m_min[0],
        precipAM: todayPrecip.am, precipPM: todayPrecip.pm,
      },
      tomorrow: {
        code: d.weather_code[1], description: codeMap[d.weather_code[1]]||'不明',
        emoji: emojiMap(d.weather_code[1]),
        high: d.temperature_2m_max[1], low: d.temperature_2m_min[1],
        precipAM: tomorrowPrecip.am, precipPM: tomorrowPrecip.pm,
      },
      fetchedAt: new Date().toISOString(),
    };

    // 従来互換のためcurrentもsaveWeatherで保存
    DB.saveWeather({ date: DB.today(), temp: c.temperature_2m, humidity: c.relative_humidity_2m,
      feelsLike: c.apparent_temperature, windSpeed: c.wind_speed_10m,
      code: c.weather_code, description: codeMap[c.weather_code]||'不明',
      emoji: emojiMap(c.weather_code), fetchedAt: new Date().toISOString() });

    return forecast;
  } catch (e) { console.warn('Weather fetch failed:', e); return null; }
}

  const [msg, setMsg] = useState('');
  const show = (m) => { setMsg(m); setTimeout(() => setMsg(''), 2200); };

// ── Weekly Calendar (直近7日) ──
function WeeklyCalendar({ onDayClick }) {
  const days = ['日','月','火','水','木','金','土'];
  const today = DB.today();
  const cells = Array.from({ length: 7 }, (_, i) => {
    const date = DB.shiftDate(today, i - 6);
    const m = DB.getLogByDate(date, 'morning');
    const n = DB.getLogByDate(date, 'night');
    const hasActivity = m?.morningActivity === 'yes';
    const hasBoth = !!m && !!n;
    const hasAny = !!m || !!n;
    const d = new Date(date + 'T00:00:00');
    const dayLabel = days[d.getDay()];
    const dayNum = d.getDate();
    const isToday = date === today;

    let dotClass = 'empty', dotLabel = dayNum;
    if (hasActivity && hasBoth) { dotClass = 'star'; dotLabel = '★'; }
    else if (hasActivity || hasBoth) { dotClass = 'logged'; }
    else if (hasAny) { dotClass = 'partial'; }
    if (isToday && dotClass === 'empty') dotClass = 'empty today';
    else if (isToday) dotClass += ' today';

    return { dayLabel, dayNum, dotClass, dotLabel, date };
  });

  return (
    <div className="week-calendar">
      {cells.map((c, i) => (
        <div key={i} className="week-day"
          style={{ cursor: onDayClick ? 'pointer' : 'default' }}
          onClick={() => onDayClick && onDayClick(c.date)}>
          <span className="week-day-label">{c.dayLabel}</span>
          <div className={`week-day-dot ${c.dotClass}`}>{c.dotLabel}</div>
        </div>
      ))}
    </div>
  );
}

// ── Calendar Date Picker ──
function CalendarPicker({ date, onChange }) {
  const [viewDate, setViewDate] = useState(date);
  const [open, setOpen] = useState(false);

  const selectedYear = parseInt(date.slice(0, 4));
  const selectedMonth = parseInt(date.slice(5, 7));
  const selectedDay = parseInt(date.slice(8, 10));

  const viewYear = parseInt(viewDate.slice(0, 4));
  const viewMonth = parseInt(viewDate.slice(5, 7));

  function getDaysInMonth(y, m) {
    return new Date(y, m, 0).getDate();
  }
  function getFirstDayOfWeek(y, m) {
    return new Date(y, m - 1, 1).getDay();
  }
  function pad(n) { return n < 10 ? '0' + n : '' + n; }

  function shiftMonth(delta) {
    let y = viewYear, m = viewMonth + delta;
    if (m > 12) { m = 1; y++; }
    if (m < 1) { m = 12; y--; }
    setViewDate(`${y}-${pad(m)}-01`);
  }

  function selectDay(day) {
    const newDate = `${viewYear}-${pad(viewMonth)}-${pad(day)}`;
    onChange(newDate);
    setOpen(false);
  }

  const daysInMonth = getDaysInMonth(viewYear, viewMonth);
  const firstDay = getFirstDayOfWeek(viewYear, viewMonth);
  const dayNames = ['日','月','火','水','木','金','土'];

  return (
    <div className="calendar-picker">
      <div className="date-nav">
        <button onClick={() => onChange(DB.shiftDate(date, -1))}>←</button>
        <div className="date-nav-center" style={{cursor:'pointer'}} onClick={() => { setViewDate(date); setOpen(!open); }}>
          <span className="date-nav-label">日付を選択</span>
          <span style={{ fontSize:'0.9rem', fontWeight:500, color:'var(--text)' }}>{DB.formatDate(date)}</span>
        </div>
        <button onClick={() => onChange(DB.shiftDate(date, 1))}>→</button>
      </div>

      {open && (
        <div className="calendar-grid-wrap">
          <div className="calendar-header">
            <button onClick={() => shiftMonth(-1)}>←</button>
            <span>{viewYear}年{viewMonth}月</span>
            <button onClick={() => shiftMonth(1)}>→</button>
          </div>
          <div className="calendar-grid">
            {dayNames.map(d => <div key={d} className="calendar-day-name">{d}</div>)}
            {Array.from({ length: firstDay }, (_, i) => <div key={'e'+i} />)}
            {Array.from({ length: daysInMonth }, (_, i) => {
              const day = i + 1;
              const isSelected = viewYear === selectedYear && viewMonth === selectedMonth && day === selectedDay;
              const isToday = `${viewYear}-${pad(viewMonth)}-${pad(day)}` === DB.today();
              return (
                <button key={day}
                  className={`calendar-day ${isSelected ? 'selected' : ''} ${isToday ? 'today' : ''}`}
                  onClick={() => selectDay(day)}>
                  {day}
                </button>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}
