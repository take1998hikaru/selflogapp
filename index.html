      {/* Calendar Date Picker */}
      <CalendarPicker date={date} onChange={setDate} />

      <div className="tab-bar" style={{marginTop: 12}}>
        <button className={`tab-btn ${tab==='morning'?'active':''}`} onClick={() => setTab('morning')}>☀️ 朝ログ</button>
        <button className={`tab-btn ${tab==='night'?'active':''}`} onClick={() => setTab('night')}>🌙 夜ログ</button>
      </div>

      {/* ── Morning ── */}
      {tab === 'morning' && (
        <div>
          {/* 朝活 — メインアクション（最上部・大きく） */}
          <div className="card" style={{ textAlign: 'center', padding: '20px 16px' }}>
            <div style={{ fontSize: '0.7rem', color: 'var(--dim)', letterSpacing: 1.5, textTransform: 'uppercase', marginBottom: 14 }}>
              今日の朝活
            </div>
            <div style={{ display: 'flex', gap: 12, justifyContent: 'center' }}>
              <button
                onClick={() => mSet('morningActivity', morning.morningActivity === 'yes' ? '' : 'yes')}
                style={{
                  flex: 1, padding: '18px 0',
                  borderRadius: 14, border: '2px solid',
                  borderColor: morning.morningActivity === 'yes' ? 'var(--accent)' : 'var(--border)',
                  background: morning.morningActivity === 'yes' ? 'rgba(0,200,150,0.15)' : 'var(--card2)',
                  color: morning.morningActivity === 'yes' ? 'var(--accent)' : 'var(--dim)',
                  fontSize: '1rem', fontWeight: 700, cursor: 'pointer',
                  transition: 'all 0.15s', fontFamily: 'inherit',
                  transform: morning.morningActivity === 'yes' ? 'scale(1.03)' : 'scale(1)',
                }}>
                ☀️<br/><span style={{fontSize:'0.8rem'}}>やった！</span>
              </button>
              <button
                onClick={() => mSet('morningActivity', morning.morningActivity === 'no' ? '' : 'no')}
                style={{
                  flex: 1, padding: '18px 0',
                  borderRadius: 14, border: '2px solid',
                  borderColor: morning.morningActivity === 'no' ? 'var(--gold)' : 'var(--border)',
                  background: morning.morningActivity === 'no' ? 'rgba(224,160,48,0.12)' : 'var(--card2)',
                  color: morning.morningActivity === 'no' ? 'var(--gold)' : 'var(--dim)',
                  fontSize: '1rem', fontWeight: morning.morningActivity === 'no' ? 700 : 600,
                  cursor: 'pointer', transition: 'all 0.15s', fontFamily: 'inherit',
                }}>
                💤<br/><span style={{fontSize:'0.8rem'}}>今日は休み</span>
              </button>
            </div>
            {morning.morningActivity === 'yes' && (
              <input type="text" className="form-input" style={{marginTop:12, textAlign:'center'}}
                placeholder="何をした？（ウォーキング、読書など）"
                value={morning.morningActivityNote||''}
                onChange={e => mSet('morningActivityNote', e.target.value)} />
            )}
          </div>

          <div className="card">
            <div className="card-title">MORNING CHECK</div>

            <div className="form-group">
              <label className="form-label">起床時間 *</label>
              <select className="form-input" value={morning.wakeTime} onChange={e=>mSet('wakeTime',e.target.value)}>
                <option value="">選択...</option>
                {(() => {
                  const opts = [];
                  for (let h = 4; h <= 12; h++) {
                    for (let m = 0; m < 60; m += 15) {
                      const label = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
                      opts.push(<option key={label} value={label}>{label}</option>);
                    }
                  }
                  return opts;
                })()}
              </select>
            </div>

            <div className="form-group">
              <label className="form-label">気分</label>
              <div className="mood-picker">
                {moods.map((m,i) => (
                  <button key={i} className={`mood-btn ${morning.mood===m?'selected':''}`} onClick={()=>mSet('mood',m)}>{m}</button>
                ))}
              </div>
            </div>

            <div className="slider-group">
              <div className="slider-header">
                <span className="form-label">体調</span>
                <span className="slider-val">{morning.bodyCondition}/5</span>
              </div>
              <input type="range" min="1" max="5" value={morning.bodyCondition} onChange={e=>mSet('bodyCondition',+e.target.value)}/>
            </div>

            <div className="slider-group">
              <div className="slider-header">
                <span className="form-label">睡眠の質</span>
                <span className="slider-val">{morning.sleepQuality}/5</span>
              </div>
              <input type="range" min="1" max="5" value={morning.sleepQuality} onChange={e=>mSet('sleepQuality',+e.target.value)}/>
            </div>

            <div className="form-group">
              <label className="form-label">メモ（任意）</label>
              <textarea className="form-textarea" rows="2" placeholder="一言でもOK" value={morning.morningNote} onChange={e=>mSet('morningNote',e.target.value)}/>
            </div>
          </div>
          <button className="btn-primary" onClick={saveMorning} disabled={!isDirtyM}>{existsM ? '更新する' : '保存する'}</button>
        </div>
      )}

      {/* ── Night ── */}
      {tab === 'night' && (
        <div>
          <div className="card">
            <div className="card-title">NIGHT REVIEW</div>

            <div className="form-group">
              <label className="form-label">就寝予定時間 *（〜28時対応）</label>
              <select className="form-input" value={night.bedTime} onChange={e=>nSet('bedTime',e.target.value)}>
                <option value="">選択...</option>
                {(() => {
                  const opts = [];
                  for (let h = 20; h <= 28; h++) {
                    for (let m = 0; m < 60; m += 15) {
                      if (h === 28 && m > 0) break;
                      const label = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
                      opts.push(<option key={label} value={label}>{label}</option>);
                    }
                  }
                  return opts;
                })()}
              </select>
            </div>

            <div className="form-group">
              <label className="form-label">今日の気分</label>
              <div className="mood-picker">
                {moods.map((m,i) => (
                  <button key={i} className={`mood-btn ${night.mood===m?'selected':''}`} onClick={()=>nSet('mood',m)}>{m}</button>
                ))}
              </div>
            </div>

            {/* 運動 (気分の下) */}
            <div className="form-group">
              <label className="form-label">運動</label>
              <div className="toggle-group">
                {[
                  { val: 'yes', label: '💪 やった' },
                  { val: 'no',  label: '💤 休み' },
                ].map(opt => (
                  <button key={opt.val}
                    className={`toggle-btn ${night.exerciseDone === opt.val ? (opt.val==='yes'?'selected-yes':'selected-no') : ''}`}
                    onClick={() => nSet('exerciseDone', night.exerciseDone === opt.val ? '' : opt.val)}>
                    {opt.label}
                  </button>
                ))}
              </div>
              {night.exerciseDone === 'yes' && (
                <input type="text" className="form-input" style={{marginTop:6}}
                  placeholder="内容（脚トレ、ウォーキングなど）"
                  value={night.exercise}
                  onChange={e => nSet('exercise', e.target.value)} />
              )}
            </div>

            {/* 1. 明日の最優先タスク */}
            <div className="form-group">
              <label className="form-label">明日の最優先タスク <span style={{color:'var(--dim)',fontWeight:400}}>→ 翌朝ホームに表示</span></label>
              {(() => {
                const activeTodos = DB.getTodos().filter(t => t.status !== 'done');
                return activeTodos.length > 0 ? (
                  <>
                    <select className="form-input" style={{marginBottom:6}}
                      value={activeTodos.some(t => t.text === night.tomorrowGoal) ? night.tomorrowGoal : ''}
                      onChange={e => { if (e.target.value) nSet('tomorrowGoal', e.target.value); }}>
                      <option value="">Todoから選ぶ...</option>
                      {activeTodos.map(t => <option key={t.id} value={t.text}>{t.text}</option>)}
                    </select>
                    <input type="text" className="form-input" placeholder="または直接入力"
                      value={night.tomorrowGoal} onChange={e=>nSet('tomorrowGoal',e.target.value)}/>
                  </>
                ) : (
                  <input type="text" className="form-input" placeholder="明日まずやること"
                    value={night.tomorrowGoal} onChange={e=>nSet('tomorrowGoal',e.target.value)}/>
                );
              })()}
            </div>

            {/* 2. 感謝・よかったこと */}
            <div className="form-group">
              <label className="form-label">感謝・よかったこと</label>
              <textarea className="form-textarea" rows="2" placeholder="今日感謝できること..." value={night.gratitude} onChange={e=>nSet('gratitude',e.target.value)}/>
            </div>

            {/* 3. 振り返り */}
            <div className="form-group">
              <label className="form-label">振り返り</label>
              <textarea className="form-textarea" rows="2" placeholder="今日どうだった？" value={night.reflection} onChange={e=>nSet('reflection',e.target.value)}/>
            </div>
          </div>

          <div className="card">
            <div className="card-title">📔 DIARY（任意）</div>
            <textarea className="form-textarea" rows="3" placeholder="一言日記..." value={diary} onChange={e=>{setDiary(e.target.value);setIsDirtyN(true);}}/>
          </div>

          <button className="btn-primary" onClick={saveNight} disabled={!isDirtyN}>{existsN ? '更新する' : '保存する'}</button>
        </div>
      )}
    </div>
  );
}

// ═════════════════════════════
//  Todo
// ═════════════════════════════
function TodoPage() {
  const [todos, setTodos] = useState(DB.getTodos());
  const [input, setInput] = useState('');
  const [priority, setPriority] = useState('medium');
  const [todoType, setTodoType] = useState('habit');
  const [dueDate, setDueDate] = useState(DB.today());
  const [hasDueDate, setHasDueDate] = useState(false);
  const [filter, setFilter] = useState('active');
  const [expandId, setExpandId] = useState(null);
  const expandRef = React.useRef(null);
  const refresh = () => setTodos(DB.getTodos());

  React.useEffect(() => {
    function handleOutsideClick(e) {
      if (expandId && expandRef.current && !expandRef.current.contains(e.target)) {
        setExpandId(null);
      }
    }
    document.addEventListener('mousedown', handleOutsideClick);
    return () => document.removeEventListener('mousedown', handleOutsideClick);
  }, [expandId]);
  const [progDate, setProgDate] = useState(DB.today());
  const [progNote, setProgNote] = useState('');

  function addProgressLog(todoId) {
    if (!progNote.trim()) return;
    const todo = todos.find(t => t.id === todoId);
    const logs = todo?.progressLogs || [];
    DB.saveTodo({ id: todoId, progressLogs: [...logs, { date: progDate, note: progNote.trim() }] });
    setProgNote('');
    refresh();
  }

  function addTodo() {
    if (!input.trim()) return;
    const entry = { text: input.trim(), priority, type: todoType };
    if (hasDueDate) entry.dueDate = dueDate;
    DB.saveTodo(entry);
    setInput('');
    setPriority('medium');
    setTodoType('habit');
    setDueDate(DB.today());
    setHasDueDate(false);
    refresh();
  }

  const statusLabels = { todo: '未着手', doing: '進行中', done: '完了' };
  const prioLabels = { high: '高', medium: '中', low: '低' };

  const filtered = todos
    .filter(t => {
      if (filter === 'active') return t.status !== 'done';
      if (filter === 'doing') return t.status === 'doing';
      if (filter === 'done') return t.status === 'done';
      return true;
    })
    .sort((a, b) => {
      if (a.status === 'done' && b.status !== 'done') return 1;
      if (a.status !== 'done' && b.status === 'done') return -1;
      if (a.status === 'doing' && b.status !== 'doing') return -1;
      if (a.status !== 'doing' && b.status === 'doing') return 1;
      const ps = { high: 0, medium: 1, low: 2 };
      const aHasDate = !!a.dueDate, bHasDate = !!b.dueDate;
      if (aHasDate && !bHasDate) return -1;
      if (!aHasDate && bHasDate) return 1;
      if (ps[a.priority] !== ps[b.priority]) return (ps[a.priority]||1) - (ps[b.priority]||1);
      return (a.dueDate||'9999-99-99').localeCompare(b.dueDate||'9999-99-99');
    });

  const activeCount = todos.filter(t => t.status !== 'done').length;
  const doingCount = todos.filter(t => t.status === 'doing').length;
  const doneCount = todos.filter(t => t.status === 'done').length;

  return (
    <div className="page">
      <Header title="ToDo" subtitle={`残り ${activeCount} ・ 進行中 ${doingCount} ・ 完了 ${doneCount}`}/>

      {/* Add Todo: 種別 → 重要度 → 期限（イベント時のみ） → タスク名 */}
      <div className="card" style={{ padding: 12, marginBottom: 12 }}>
        <div className="card-title" style={{ marginBottom: 8 }}>タスクを追加</div>
        <div style={{ display: 'flex', gap: 6, marginBottom: 8, alignItems: 'center', flexWrap: 'wrap' }}>
          <div style={{ flex: '0 0 auto' }}>
            <label style={{ fontSize: '0.6rem', color: 'var(--dim)', display: 'block', marginBottom: 2 }}>種別</label>
            <select value={todoType} onChange={e => { setTodoType(e.target.value); if (e.target.value === 'event') setHasDueDate(true); }}
              className="form-select" style={{ padding: '7px 8px', fontSize: '0.78rem', width: 90 }}>
              <option value="habit">習慣</option>
              <option value="event">イベント</option>
            </select>
          </div>
          <div style={{ flex: '0 0 auto' }}>
            <label style={{ fontSize: '0.6rem', color: 'var(--dim)', display: 'block', marginBottom: 2 }}>重要度</label>
            <select value={priority} onChange={e => setPriority(e.target.value)}
              className="form-select" style={{ padding: '7px 8px', fontSize: '0.78rem', width: 70 }}>
              <option value="high">高</option>
              <option value="medium">中</option>
              <option value="low">低</option>
            </select>
          </div>
          <div style={{ flex: '0 0 auto' }}>
            <label style={{ fontSize: '0.6rem', color: 'var(--dim)', display: 'block', marginBottom: 2 }}>期限</label>
            <button
              onClick={() => setHasDueDate(p => !p)}
              style={{
                padding: '7px 10px', borderRadius: 8, border: '1px solid',
                borderColor: hasDueDate ? 'var(--accent)' : 'var(--border)',
                background: hasDueDate ? 'rgba(0,200,150,0.12)' : 'var(--card2)',
                color: hasDueDate ? 'var(--accent)' : 'var(--dim)',
                fontSize: '0.75rem', cursor: 'pointer', fontFamily: 'inherit', fontWeight: 600,
              }}>
              {hasDueDate ? '📅 設定あり' : '期限なし'}
            </button>
          </div>
          {hasDueDate && (
            <div style={{ flex: '0 0 auto' }}>
              <label style={{ fontSize: '0.6rem', color: 'var(--dim)', display: 'block', marginBottom: 2 }}>日付</label>
              <input type="date" value={dueDate} onChange={e => setDueDate(e.target.value)}
                className="date-input-light" />
            </div>
          )}
        </div>
        <div className="todo-input-row" style={{ marginBottom: 0 }}>
          <input type="text" className="form-input" placeholder="タスク名（Enter で追加）"
            value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')addTodo();}}/>
          <button className="todo-add-btn" onClick={addTodo}>+</button>
        </div>
      </div>

      <div className="todo-filter-bar">
        {[
          {k:'active',l:`未完了 (${activeCount})`},
          {k:'doing',l:`進行中 (${doingCount})`},
          {k:'all',l:`すべて (${todos.length})`},
          {k:'done',l:`完了 (${doneCount})`},
        ].map(f=>(
          <button key={f.k} className={`todo-filter-btn ${filter===f.k?'active':''}`} onClick={()=>setFilter(f.k)}>{f.l}</button>
        ))}
      </div>

      {filtered.length===0 && (
        <div style={{textAlign:'center',color:'var(--dim)',padding:'30px 0',fontSize:'0.85rem'}}>
          {filter==='active'?'すべて完了！🎉':'タスクがありません'}
        </div>
      )}

      {filtered.map(todo => {
        const isOverdue = todo.dueDate && todo.dueDate < DB.today() && todo.status !== 'done';
        const isExpanded = expandId === todo.id;
        return (
          <div key={todo.id}>
            <div className={`todo-item status-${todo.status}`}>
              <button
                className={`todo-status-btn ${todo.status==='doing'?'s-doing':''} ${todo.status==='done'?'s-done':''}`}
                onClick={() => {DB.cycleTodoStatus(todo.id);refresh();}}
              >
                {todo.status==='done'?'✓':todo.status==='doing'?'▶':''}
              </button>
              <div style={{flex:1, cursor:'pointer'}} onClick={()=>setExpandId(isExpanded?null:todo.id)}>
                <span className="todo-text">{todo.text}</span>
                <div className="todo-meta">
                  <span className={`todo-meta-tag ${todo.priority}`}>{prioLabels[todo.priority]}</span>
                  {todo.dueDate && <span className={`todo-meta-tag ${isOverdue?'overdue':''}`}>
                    {isOverdue ? '⚠ ' : ''}{DB.formatDate(todo.dueDate)}
                  </span>}
                  {todo.status === 'doing' && <span className="todo-meta-tag" style={{borderColor:'rgba(74,158,255,0.4)',color:'var(--blue)'}}>進行中</span>}
                </div>
                {todo.memo && <div className="todo-memo">{todo.memo}</div>}
              </div>
              <button className="todo-delete" onClick={()=>{DB.deleteTodo(todo.id);refresh();}}>✕</button>
            </div>
            {isExpanded && (
              <div ref={expandRef} className="card" style={{padding:12, marginTop:-4, marginBottom:8, borderTopLeftRadius:0, borderTopRightRadius:0}}>
                <div className="todo-expand-row" style={{marginBottom:6}}>
                  <input type="text" value={todo.text}
                    onChange={e=>{DB.saveTodo({id:todo.id,text:e.target.value});refresh();}}
                    onKeyDown={e=>{if(e.key==='Enter')setExpandId(null);}}
                    style={{width:'100%', padding:'7px 10px', background:'var(--card2)', border:'1px solid var(--accent)', borderRadius:8, color:'var(--text)', fontFamily:'inherit', fontSize:'0.88rem', fontWeight:500}}
                    placeholder="タスク名を編集"/>
                </div>
                <div className="todo-expand-row">
                  <select value={todo.type||'habit'} onChange={e=>{DB.saveTodo({id:todo.id,type:e.target.value});refresh();}}>
                    <option value="habit">習慣</option>
                    <option value="event">イベント</option>
                  </select>
                  <select value={todo.priority} onChange={e=>{DB.saveTodo({id:todo.id,priority:e.target.value});refresh();}}>
                    <option value="high">優先: 高</option>
                    <option value="medium">優先: 中</option>
                    <option value="low">優先: 低</option>
                  </select>
                  <select value={todo.status} onChange={e=>{DB.saveTodo({id:todo.id,status:e.target.value});refresh();}}>
                    <option value="todo">未着手</option>
                    <option value="doing">進行中</option>
                    <option value="done">完了</option>
                  </select>
                </div>
                <div className="todo-expand-row">
                  <label style={{fontSize:'0.62rem',color:'var(--dim)',flexShrink:0}}>期限日</label>
                  <input type="date" value={todo.dueDate||''} onChange={e=>{DB.saveTodo({id:todo.id,dueDate:e.target.value||null});refresh();}}
                    className="date-input-light" style={{flex:1}}/>
                  {todo.dueDate && (
                    <button onClick={()=>{DB.saveTodo({id:todo.id,dueDate:null});refresh();}}
                      style={{padding:'4px 8px',background:'transparent',border:'1px solid var(--border)',borderRadius:6,color:'var(--dim)',cursor:'pointer',fontSize:'0.7rem',fontFamily:'inherit',whiteSpace:'nowrap'}}>
                      期限なし
                    </button>
                  )}
                </div>
                <div className="todo-expand-row" style={{flexDirection:'column', gap:6}}>
                  <div style={{display:'flex', gap:6, alignItems:'center'}}>
                    <label style={{fontSize:'0.62rem',color:'var(--dim)',flexShrink:0}}>メモ日付</label>
                    <input type="date" value={todo.memoDate||''} onChange={e=>{DB.saveTodo({id:todo.id,memoDate:e.target.value});refresh();}}
                      style={{flex:1, padding:'5px 8px', background:'var(--card)', border:'1px solid var(--border)', borderRadius:6, color:'var(--text)', fontFamily:'inherit', fontSize:'0.75rem'}}/>
                  </div>
                  <input type="text" placeholder="メモ（任意）" value={todo.memo||''}
                    onChange={e=>{DB.saveTodo({id:todo.id,memo:e.target.value});refresh();}}
                    style={{width:'100%'}}/>
                </div>

                {/* 日々の記録 */}
                <div style={{marginTop:10, borderTop:'1px solid var(--border)', paddingTop:10}}>
                  <div style={{fontSize:'0.65rem', color:'var(--dim)', marginBottom:6, letterSpacing:'0.8px', textTransform:'uppercase'}}>日々の記録</div>
                  {(todo.progressLogs||[]).map((log, i) => (
                    <div key={i} style={{display:'flex', gap:8, padding:'5px 8px', background:'var(--bg)', borderRadius:6, marginBottom:4}}>
                      <span style={{color:'var(--dim)', fontSize:'0.65rem', flexShrink:0}}>{DB.formatDate(log.date)}</span>
                      <span style={{flex:1, fontSize:'0.78rem'}}>{log.note}</span>
                    </div>
                  ))}
                  <div style={{display:'flex', gap:6, marginTop:6}}>
                    <input type="date" value={progDate} onChange={e=>setProgDate(e.target.value)}
                      style={{width:130, padding:'5px 6px', background:'var(--card)', border:'1px solid var(--border)', borderRadius:6, color:'var(--text)', fontFamily:'inherit', fontSize:'0.72rem'}}/>
                    <input type="text" placeholder="感じたこと・進捗..." value={progNote}
                      onChange={e=>setProgNote(e.target.value)}
                      onKeyDown={e=>{if(e.key==='Enter')addProgressLog(todo.id);}}
                      style={{flex:1, padding:'5px 8px', background:'var(--card)', border:'1px solid var(--border)', borderRadius:6, color:'var(--text)', fontFamily:'inherit', fontSize:'0.78rem'}}/>
                    <button onClick={()=>addProgressLog(todo.id)}
                      style={{padding:'5px 12px', background:'var(--accent)', border:'none', borderRadius:6, color:'#000', cursor:'pointer', fontSize:'0.78rem', fontFamily:'inherit', fontWeight:600}}>記録</button>
                  </div>
                </div>
              </div>
            )}
          </div>
        );
      })}

      {doneCount>0 && (
        <div style={{marginTop:14,textAlign:'center'}}>
          <button className="btn-danger" onClick={()=>{todos.filter(t=>t.status==='done').forEach(t=>DB.deleteTodo(t.id));refresh();}}>
            完了済みを削除 ({doneCount})
          </button>
        </div>
      )}
    </div>
  );
}

// ═════════════════════════════
//  History
// ═════════════════════════════
function HistoryPage() {
  const [date, setDate] = useState(DB.today());
  const [copyMsg, setCopyMsg] = useState('');

  const mLog = DB.getLogByDate(date, 'morning');
  const nLog = DB.getLogByDate(date, 'night');
  const diary = DB.getDiaryByDate(date);
  const weather = DB.getWeatherByDate(date);
  const todos = DB.getTodos().filter(t => t.dueDate === date);
  const dayMurmurs = DB.getMurmursByDate(date);
  const hasData = mLog || nLog || diary || weather || todos.length > 0 || dayMurmurs.length > 0;

  const generateAIReport = () => {
    const logs = JSON.parse(localStorage.getItem('selfcare_logs') || '[]');
    const diaries = JSON.parse(localStorage.getItem('selfcare_diary') || '[]');
    const todoList = JSON.parse(localStorage.getItem('selfcare_todos') || '[]');

    function esc(v) {
      if (v == null) return '';
      const s = String(v);
      return s.includes(',') || s.includes('"') || s.includes('\n')
        ? '"' + s.replace(/"/g, '""') + '"' : s;
    }
    function row(...cells) { return cells.map(esc).join(','); }

    const lines = [];
    lines.push('## 朝ログ');
    lines.push(row('日付','起床時間','気分','体調','睡眠の質','朝活','朝活内容','メモ'));
    logs.filter(l => l.type === 'morning').sort((a,b) => a.date.localeCompare(b.date)).forEach(l => {
      lines.push(row(l.date, l.wakeTime, l.mood, l.bodyCondition, l.sleepQuality,
        l.morningActivity === 'yes' ? 'やった' : l.morningActivity === 'no' ? 'できなかった' : '',
        l.morningActivityNote, l.morningNote));
    });
    lines.push('');
    lines.push('## 夜ログ');
    lines.push(row('日付','就寝予定','気分','運動','運動内容','明日の最優先タスク','感謝・よかったこと','振り返り'));
    logs.filter(l => l.type === 'night').sort((a,b) => a.date.localeCompare(b.date)).forEach(l => {
      lines.push(row(l.date, l.bedTime, l.mood,
        l.exerciseDone === 'yes' ? 'やった' : l.exerciseDone === 'no' ? '休み' : '',
        l.exercise, l.tomorrowGoal, l.gratitude, l.reflection));
    });
    lines.push('');
    lines.push('## Todo');
    lines.push(row('タスク名','重要度','期限','状態','メモ','作成日'));
    const prioLabel = { high: '高', medium: '中', low: '低' };
    const statusLabel = { todo: '未着手', doing: '進行中', done: '完了' };
    todoList.sort((a,b) => (a.dueDate||'').localeCompare(b.dueDate||'')).forEach(t => {
      lines.push(row(t.text, prioLabel[t.priority]||t.priority, t.dueDate,
        statusLabel[t.status]||t.status, t.memo, t.createdAt?.slice(0,10)));
    });
    lines.push('');
    lines.push('## 日記');
    lines.push(row('日付','内容'));
    diaries.sort((a,b) => a.date.localeCompare(b.date)).forEach(d => {
      lines.push(row(d.date, d.content));
    });

    const csvText = lines.join('\n');
    const todayStr = DB.today(); // ローカル日付（UTC問題を回避）
    const prompt = `私の現時点の生データです。分析してください。\n\n` + csvText;

    const copyToClipboard = (text) => {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(() => {
          setCopyMsg('✅ コピーしました！Claudeに貼り付けてください');
          setTimeout(() => setCopyMsg(''), 4000);
        }).catch(() => fallbackCopy(text));
      } else {
        fallbackCopy(text);
      }
    };

    const fallbackCopy = (text) => {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.left = '-9999px';
      document.body.appendChild(ta);
      ta.select();
      try {
        document.execCommand('copy');
        setCopyMsg('✅ コピーしました！Claudeに貼り付けてください');
        setTimeout(() => setCopyMsg(''), 4000);
      } catch(e) {
        setCopyMsg('❌ コピーに失敗しました');
        setTimeout(() => setCopyMsg(''), 4000);
      }
      document.body.removeChild(ta);
    };

    copyToClipboard(prompt);
  };

  const Field = ({label, value}) => {
    if (!value && value !== 0) return null;
    return <div className="history-entry"><span className="label">{label}</span><span className="value">{value}</span></div>;
  };
  const Bar = ({label, value, max=5}) => {
    if (!value) return null;
    const pct = (value/max)*100;
    return (
      <div className="history-entry">
        <span className="label">{label}</span><span className="value">{value}/{max}</span>
        <div style={{marginTop:4,height:4,background:'var(--border)',borderRadius:2,overflow:'hidden'}}>
          <div style={{width:`${pct}%`,height:'100%',background:pct>=80?'var(--accent)':pct>=50?'var(--gold)':'var(--red)',borderRadius:2}}/>
        </div>
      </div>
    );
  };

  return (
    <div className="page">
      <Header
        title="履歴"
        subtitle="過去のログを振り返る"
        right={
          <div style={{ display: 'flex', gap: 6 }}>
            <button onClick={generateAIReport} style={{
              padding: '6px 12px', background: 'var(--accent)',
              border: '1px solid var(--accent)', borderRadius: 8,
              color: '#000', fontFamily: 'inherit', fontSize: '0.72rem',
              cursor: 'pointer', whiteSpace: 'nowrap', fontWeight: 700,
            }}>
              🤖 AIレポート
            </button>
            <button onClick={() => DB.exportCSV()} style={{
              padding: '6px 12px', background: 'transparent',
              border: '1px solid var(--accent)', borderRadius: 8,
              color: 'var(--accent)', fontFamily: 'inherit', fontSize: '0.72rem',
              cursor: 'pointer', whiteSpace: 'nowrap',
            }}>
              ⬇ CSV
            </button>
          </div>
        }
      />

      {copyMsg && (
        <div style={{
          background: 'var(--card)', border: '1px solid var(--accent)',
          borderRadius: 8, padding: '10px 14px', marginBottom: 12,
          color: 'var(--accent)', fontSize: '0.85rem', fontWeight: 600,
        }}>
          {copyMsg}
          <div style={{ color: 'var(--dim)', fontSize: '0.75rem', marginTop: 4 }}>
            claude.ai を開いて貼り付け（Ctrl+V / ⌘V）して送信してください
          </div>
        </div>
      )}

      <CalendarPicker date={date} onChange={setDate} />

      {weather && (
        <div className="weather-compact" style={{marginTop: 12}}>
          <WeatherIcon code={weather.code} size={44} />
          <div className="weather-info">
            <div className="weather-main">
              <span className="weather-temp">{weather.temp}°C</span>
              <span className="weather-desc">{weather.description}</span>
            </div>
            <div className="weather-details">
              <span className="weather-detail">湿度 <span>{weather.humidity}%</span></span>
              <span className="weather-detail">体感 <span>{weather.feelsLike}°</span></span>
            </div>
          </div>
        </div>
      )}

      {mLog && (
        <div className="card">
          <div className="card-title">☀️ MORNING LOG</div>
          <Field label="起床" value={mLog.wakeTime}/>
          <Field label="気分" value={mLog.mood}/>
          {mLog.morningActivity && (
            <Field label="朝活"
              value={mLog.morningActivity === 'yes'
                ? `✅ やった${mLog.morningActivityNote ? ` — ${mLog.morningActivityNote}` : ''}`
                : '❌ できなかった'} />
          )}
          <Bar label="体調" value={mLog.bodyCondition}/>
          <Bar label="睡眠の質" value={mLog.sleepQuality}/>
          {mLog.morningNote && <Field label="メモ" value={mLog.morningNote}/>}
        </div>
      )}

      {nLog && (
        <div className="card">
          <div className="card-title">🌙 NIGHT LOG</div>
          <Field label="就寝" value={nLog.bedTime}/>
          <Field label="気分" value={nLog.mood}/>
          {nLog.exerciseDone && (
            <Field label="運動"
              value={nLog.exerciseDone === 'yes'
                ? `💪 やった${nLog.exercise ? ` — ${nLog.exercise}` : ''}`
                : '💤 休み'} />
          )}
          {nLog.tomorrowGoal && <Field label="明日の最優先" value={nLog.tomorrowGoal}/>}
          {nLog.gratitude && <Field label="感謝" value={nLog.gratitude}/>}
          {nLog.reflection && <Field label="振り返り" value={nLog.reflection}/>}
        </div>
      )}

      {todos.length > 0 && (
        <div className="card">
          <div className="card-title">📋 TODO ({date})</div>
          {todos.map(t => (
            <div key={t.id} className="history-entry" style={{display:'flex',gap:8,alignItems:'center'}}>
              <span style={{color: t.status==='done'?'var(--accent)':t.status==='doing'?'var(--blue)':'var(--dim)'}}>
                {t.status==='done'?'✓':t.status==='doing'?'▶':'○'}
              </span>
              <span style={{textDecoration: t.status==='done'?'line-through':'none', opacity: t.status==='done'?0.5:1}}>
                {t.text}
              </span>
            </div>
          ))}
        </div>
      )}

      {diary && (
        <div className="card">
          <div className="card-title">📔 DIARY</div>
          <div className="history-entry"><div className="value" style={{whiteSpace:'pre-wrap'}}>{diary.content}</div></div>
        </div>
      )}

      {dayMurmurs.length > 0 && (
        <div className="card">
          <div className="card-title">💬 MURMURS <span className="accent">{dayMurmurs.length}</span></div>
          {dayMurmurs.map(m => (
            <div key={m.id} className="history-entry" style={{display:'flex',gap:8,alignItems:'flex-start'}}>
              <span style={{color:'var(--dim)',fontSize:'0.7rem',flexShrink:0,marginTop:2}}>
                {new Date(m.createdAt).toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'})}
              </span>
              <div style={{flex:1}}>
                {m.mood && <span style={{marginRight:4}}>{m.mood}</span>}
                <span>{m.text}</span>
              </div>
            </div>
          ))}
        </div>
      )}

      {!hasData && (
        <div className="card" style={{textAlign:'center',padding:30,color:'var(--dim)',marginTop:12}}>この日のデータはありません</div>
      )}
    </div>
  );
}

// ═════════════════════════════
//  Murmur Page (つぶやき)
// ═════════════════════════════
const MURMUR_MAX = 140;
const MURMUR_MOODS = ['😊','😐','😢','😤','🔥','💤','🎉','💡'];
const MURMUR_DEFAULT_TAGS = [
  { tag: '体調', icon: '💊' },
  { tag: '気分', icon: '🫧' },
  { tag: '学び', icon: '📖' },
  { tag: '達成', icon: '✨' },
  { tag: '雑記', icon: '📝' },
  { tag: '仕事', icon: '💼' },
  { tag: '世界遺産', icon: '🏛' },
];

function getCustomTags() {
  try { return JSON.parse(localStorage.getItem('selfcare_custom_tags')) || []; }
  catch { return []; }
}
function saveCustomTags(tags) {
  localStorage.setItem('selfcare_custom_tags', JSON.stringify(tags));
}

function MurmurPage() {
  const [text, setText] = useState('');
  const [mood, setMood] = useState('');
  const [selectedTags, setSelectedTags] = useState([]);
  const [murmurs, setMurmurs] = useState(DB.getMurmurs());
  const [filterTag, setFilterTag] = useState('');
  const [confirmId, setConfirmId] = useState(null);
  const [editId, setEditId] = useState(null);
  const [editText, setEditText] = useState('');
  const [editMood, setEditMood] = useState('');
  const [editTags, setEditTags] = useState([]);
  const [newTagInput, setNewTagInput] = useState('');
  const [showTagForm, setShowTagForm] = useState(false);
  const [customTags, setCustomTags] = useState(getCustomTags());
  const [toastEl, showToast] = useToast();
  const allTags = DB.getAllMurmurTags();

  const quickTags = [...MURMUR_DEFAULT_TAGS, ...customTags.map(t => ({ tag: t, icon: '🏷' }))];

  function reload() { setMurmurs(DB.getMurmurs()); }

  function toggleTag(tag) {
    setSelectedTags(prev =>
      prev.includes(tag) ? prev.filter(t => t !== tag) : [...prev, tag]
    );
  }

  function addCustomTag() {
    const t = newTagInput.trim().replace(/^#/, '');
    if (!t) return;
    if (quickTags.some(qt => qt.tag === t)) { showToast('既に存在するタグです'); return; }
    const updated = [...customTags, t];
    setCustomTags(updated);
    saveCustomTags(updated);
    setNewTagInput('');
    setShowTagForm(false);
    showToast(`🏷 #${t} を追加しました`);
  }

  function removeCustomTag(tag) {
    const updated = customTags.filter(t => t !== tag);
    setCustomTags(updated);
    saveCustomTags(updated);
    showToast(`#${tag} を削除しました`);
  }

  function post() {
    const trimmed = text.trim();
    if (!trimmed && selectedTags.length === 0) return;
    const inlineTags = [];
    (trimmed || '').replace(/#([\w\u3000-\u9fff\uf900-\ufaff]+)/g, (_, t) => { inlineTags.push(t); });
    const tags = [...new Set([...selectedTags, ...inlineTags])];
    DB.saveMurmur({ text: trimmed, mood, tags });
    setText('');
    setMood('');
    setSelectedTags([]);
    reload();
    showToast('💬 つぶやきました');
  }

  function handleDelete(id) {
    DB.deleteMurmur(id);
    setConfirmId(null);
    reload();
    showToast('🗑 削除しました');
  }

  function startEdit(m) {
    setEditId(m.id);
    setEditText(m.text || '');
    setEditMood(m.mood || '');
    setEditTags([...(m.tags || [])]);
  }

  function cancelEdit() {
    setEditId(null);
    setEditText('');
    setEditMood('');
    setEditTags([]);
  }

  function saveEdit() {
    const trimmed = editText.trim();
    if (!trimmed && editTags.length === 0) return;
    const inlineTags = [];
    (trimmed || '').replace(/#([\w\u3000-\u9fff\uf900-\ufaff]+)/g, (_, t) => { inlineTags.push(t); });
    const tags = [...new Set([...editTags, ...inlineTags])];
    DB.updateMurmur(editId, { text: trimmed, mood: editMood, tags });
    cancelEdit();
    reload();
    showToast('✏️ 更新しました');
  }

  function toggleEditTag(tag) {
    setEditTags(prev =>
      prev.includes(tag) ? prev.filter(t => t !== tag) : [...prev, tag]
    );
  }

  function handleKeyDown(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      post();
    }
  }

  const canPost = text.trim() || selectedTags.length > 0;

  // フィルタリング（削除済みは除外）
  const filtered = filterTag
    ? murmurs.filter(m => !m.deleted && (m.tags || []).includes(filterTag))
    : murmurs.filter(m => !m.deleted);

  // 日付グルーピング
  const grouped = {};
  filtered.forEach(m => {
    const d = (m.createdAt || '').slice(0, 10);
    if (!grouped[d]) grouped[d] = [];
    grouped[d].push(m);
  });
  const sortedDates = Object.keys(grouped).sort().reverse();

  function dateLabel(dateStr) {
    const today = DB.today();
    const yesterday = DB.shiftDate(today, -1);
    if (dateStr === today) return '今日';
    if (dateStr === yesterday) return '昨日';
    return DB.formatDate(dateStr);
  }

  function timeLabel(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    if (isNaN(d.getTime())) return '';
    return DB._pad(d.getHours()) + ':' + DB._pad(d.getMinutes());
  }

  function displayText(m) {
    const cleaned = (m.text || '').replace(/#[\w\u3000-\u9fff\uf900-\ufaff]+/g, '').trim();
    return cleaned;
  }

  return (
    <div className="page">
      <Header title="つぶやき" subtitle="気軽にひとこと" />
      {toastEl}

      {/* 投稿フォーム */}
      <div className="card murmur-compose">
        <textarea
          className="form-textarea murmur-input"
          placeholder="一言でOK。「眠い」でも立派な記録"
          value={text}
          onChange={e => setText(e.target.value.slice(0, MURMUR_MAX))}
          onKeyDown={handleKeyDown}
          rows={2}
        />
        <div className="murmur-compose-bottom">
          <div className="murmur-compose-row">
            <div className="murmur-mood-row">
              {MURMUR_MOODS.map(m => (
                <button key={m} className={`mood-btn murmur-mood-btn ${mood===m?'selected':''}`}
                  onClick={() => setMood(mood===m?'':m)}>{m}</button>
              ))}
            </div>
            <div className="murmur-count-wrap">
              <span className={`murmur-count ${text.length >= MURMUR_MAX ? 'over' : ''}`}>
                {text.length}/{MURMUR_MAX}
              </span>
            </div>
          </div>
          <div className="murmur-compose-row">
            <div className="murmur-quick-tags">
              {quickTags.map(({tag, icon}) => (
                <button key={tag} className={`murmur-quick-tag ${selectedTags.includes(tag)?'active':''}`}
                  onClick={() => toggleTag(tag)}>{icon} #{tag}</button>
              ))}
              <button className="murmur-quick-tag murmur-add-tag" onClick={() => setShowTagForm(!showTagForm)}>＋</button>
            </div>
            <button className="btn-primary murmur-post-btn" disabled={!canPost} onClick={post}>
              投稿
            </button>
          </div>
          {showTagForm && (
            <div className="murmur-tag-form">
              <input className="form-input" placeholder="新しいタグ名"
                value={newTagInput} onChange={e => setNewTagInput(e.target.value)}
                onKeyDown={e => { if (e.key === 'Enter') { e.preventDefault(); addCustomTag(); } }}
                style={{flex:1,fontSize:'0.8rem',padding:'6px 10px'}} />
              <button className="btn-primary" onClick={addCustomTag}
                style={{padding:'6px 14px',fontSize:'0.75rem',width:'auto',margin:0}}>追加</button>
            </div>
          )}
          {showTagForm && customTags.length > 0 && (
            <div className="murmur-custom-tags-list">
              {customTags.map(t => (
                <span key={t} className="murmur-custom-tag-item">
                  🏷 #{t}
                  <button onClick={() => removeCustomTag(t)} className="murmur-custom-tag-remove">×</button>
                </span>
              ))}
            </div>
          )}
        </div>
      </div>

      {/* タグフィルター */}
      {allTags.length > 0 && (
        <div className="murmur-tag-filter">
          <button className={`todo-filter-btn ${!filterTag?'active':''}`} onClick={() => setFilterTag('')}>すべて</button>
          {allTags.map(tag => (
            <button key={tag} className={`todo-filter-btn ${filterTag===tag?'active':''}`}
              onClick={() => setFilterTag(filterTag===tag?'':tag)}>#{tag}</button>
          ))}
        </div>
      )}

      {/* タイムライン */}
      {sortedDates.length === 0 && (
        <div className="murmur-empty">
          <div className="murmur-empty-icon">💬</div>
          <div className="murmur-empty-text">まだつぶやきがありません</div>
          <div className="murmur-empty-hint">上のフォームから気軽にひとこと投稿しよう</div>
        </div>
      )}
      {sortedDates.map(date => (
        <div key={date}>
          <div className="murmur-date-header">
            <span className="murmur-date-line" />
            <span className="murmur-date-label">{dateLabel(date)}</span>
            <span className="murmur-date-line" />
          </div>
          {grouped[date].map(m => {
            const cleanText = displayText(m);
            const isEditing = editId === m.id;
            return (
            <div key={m.id} className={`murmur-item ${isEditing?'editing':''}`}>
              {isEditing ? (
                /* 編集モード */
                <div className="murmur-edit-form">
                  <textarea className="form-textarea murmur-input" value={editText}
                    onChange={e => setEditText(e.target.value.slice(0, MURMUR_MAX))} rows={2} />
                  <div className="murmur-mood-row" style={{marginTop:6}}>
                    {MURMUR_MOODS.map(em => (
                      <button key={em} className={`mood-btn murmur-mood-btn ${editMood===em?'selected':''}`}
                        onClick={() => setEditMood(editMood===em?'':em)}>{em}</button>
                    ))}
                  </div>
                  <div className="murmur-quick-tags" style={{marginTop:6}}>
                    {quickTags.map(({tag, icon}) => (
                      <button key={tag} className={`murmur-quick-tag ${editTags.includes(tag)?'active':''}`}
                        onClick={() => toggleEditTag(tag)}>{icon} #{tag}</button>
                    ))}
                  </div>
                  <div style={{display:'flex',gap:6,marginTop:8,justifyContent:'flex-end'}}>
                    <button className="murmur-confirm-no" onClick={cancelEdit}>キャンセル</button>
                    <button className="murmur-confirm-yes" onClick={saveEdit}
                      style={{background:'var(--accent)'}}>保存</button>
                  </div>
                </div>
              ) : (
                /* 表示モード */
                <>
                  <div className="murmur-item-header">
                    <span className="murmur-item-time">{timeLabel(m.createdAt)}</span>
                    {m.mood && <span className="murmur-item-mood">{m.mood}</span>}
                    {m.updatedAt && <span className="murmur-edited-badge">編集済</span>}
                    <span style={{flex:1}} />
                    {confirmId === m.id ? (
                      <span className="murmur-confirm">
                        <button className="murmur-confirm-yes" onClick={() => handleDelete(m.id)}>削除</button>
                        <button className="murmur-confirm-no" onClick={() => setConfirmId(null)}>戻す</button>
                      </span>
                    ) : (
                      <span className="murmur-actions-group">
                        <button className="murmur-edit-btn" onClick={() => startEdit(m)} title="編集">✏️</button>
                        <button className="murmur-delete" onClick={() => setConfirmId(m.id)} title="削除">×</button>
                      </span>
                    )}
                  </div>
                  {cleanText && <div className="murmur-item-text">{cleanText}</div>}
                  {(m.tags || []).length > 0 && (
                    <div className="murmur-item-tags">
                      {m.tags.map(t => (
                        <span key={t} className="murmur-tag" onClick={() => setFilterTag(t)}>#{t}</span>
                      ))}
                    </div>
                  )}
                </>
              )}
            </div>
            );
          })}
        </div>
      ))}
    </div>
  );
}

// ═════════════════════════════
//  Settings Page
// ═════════════════════════════
function SettingsPage() {
  const [token, setToken] = useState('');
  const [syncing, setSyncing] = useState(false);
  const [status, setStatus] = useState('');
  const isConnected = !!getSyncToken();
  const lastSync = getLastSyncTime();
  const toast = useToast();

  const handleConnect = async () => {
    if (!token.trim()) { toast.show('トークンを入力してください', 'error'); return; }
    setSyncing(true);
    setStatus('接続中...');
    try {
      await connectSync(token.trim());
      setStatus('');
      setToken('');
      toast.show('同期を開始しました');
    } catch (e) {
      setStatus('');
      toast.show('接続エラー: ' + e, 'error');
    }
    setSyncing(false);
  };

  const handleSync = () => {
    setSyncing(true);
    setStatus('同期中...');
    updateSyncBar('syncing');
    syncToGist((err, msg) => {
      setSyncing(false);
      setStatus('');
      updateSyncBar(err ? 'error' : 'ok');
      if (err) toast.show('同期エラー: ' + err, 'error');
      else toast.show('同期完了');
    });
  };

  const handleDisconnect = () => {
    if (!confirm('同期を解除しますか？\nデータはこの端末に残ります。')) return;
    disconnectSync();
    toast.show('同期を解除しました');
  };

  const handleExportCSV = () => {
    DB.exportCSV();
    toast.show('CSVをダウンロードしました');
  };

  const handleResetData = () => {
    if (!confirm('すべてのデータをリセットしますか？\nこの操作は取り消せません。')) return;
    Object.values(KEYS).forEach(k => localStorage.removeItem(k));
    toast.show('データをリセットしました');
  };

  const formatTime = (iso) => {
    if (!iso) return '';
    const d = new Date(iso);
    return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  };

  return (
    <div className="page">
      {toast.el}
      <Header title="設定" />

      <div className="card" style={{marginTop:12}}>
        <h3 style={{margin:'0 0 12px',fontSize:'1rem',color:'var(--text)'}}>同期設定</h3>
        {isConnected ? (
          <>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
              <span style={{width:10,height:10,borderRadius:'50%',background:'var(--accent)',flexShrink:0}}></span>
              <span style={{color:'var(--accent)',fontWeight:600}}>接続済み（Gist同期ON）</span>
            </div>
            {lastSync && (
              <p style={{fontSize:'0.85rem',color:'var(--dim)',margin:'0 0 12px'}}>最終同期: {formatTime(lastSync)}</p>
            )}
            <p style={{fontSize:'0.8rem',color:'var(--dim)',margin:'0 0 16px'}}>保存ごとに自動同期 / 起動時にも自動取得</p>
            <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
              <button className="btn-action" onClick={handleSync} disabled={syncing}
                style={{background:'var(--accent)',color:'#fff',border:'none',padding:'10px 20px',borderRadius:8,fontWeight:600,fontSize:'0.9rem'}}>
                {syncing ? '同期中...' : '今すぐ同期'}
              </button>
              <button className="btn-action" onClick={handleDisconnect}
                style={{background:'#e05555',color:'#fff',border:'none',padding:'10px 20px',borderRadius:8,fontWeight:600,fontSize:'0.9rem'}}>
                同期を解除
              </button>
            </div>
          </>
        ) : (
          <>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
              <span style={{width:10,height:10,borderRadius:'50%',background:'#666',flexShrink:0}}></span>
              <span style={{color:'var(--dim)'}}>未接続（この端末のみ）</span>
            </div>
            <p style={{fontSize:'0.85rem',color:'var(--dim)',margin:'0 0 12px'}}>GitHubトークンを入力すると、PC・スマホ間でデータを同期できます。</p>
            <div style={{display:'flex',gap:8,marginBottom:8}}>
              <input type="password" value={token} onChange={e => setToken(e.target.value)}
                placeholder="ghp_xxxx..."
                style={{flex:1,background:'var(--card2)',border:'1px solid #444',borderRadius:8,padding:'10px 12px',color:'var(--text)',fontSize:'0.9rem'}} />
              <button onClick={handleConnect} disabled={syncing}
                style={{background:'var(--accent)',color:'#fff',border:'none',padding:'10px 16px',borderRadius:8,fontWeight:600,fontSize:'0.9rem',whiteSpace:'nowrap'}}>
                {syncing ? '...' : '接続'}
              </button>
            </div>
            <p style={{fontSize:'0.75rem',color:'var(--dim)',margin:0}}>トークンはこの端末のブラウザにのみ保存されます。</p>
          </>
        )}
        {status && <p style={{color:'var(--accent)',marginTop:8,fontSize:'0.85rem'}}>{status}</p>}
      </div>

      <div className="card" style={{marginTop:12}}>
        <h3 style={{margin:'0 0 12px',fontSize:'1rem',color:'var(--text)'}}>データ管理</h3>
        <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
          <button onClick={handleExportCSV}
            style={{background:'var(--card2)',color:'var(--text)',border:'1px solid #444',padding:'10px 20px',borderRadius:8,fontWeight:600,fontSize:'0.9rem'}}>
            CSVダウンロード
          </button>
          <button onClick={handleResetData}
            style={{background:'var(--card2)',color:'var(--red)',border:'1px solid #444',padding:'10px 20px',borderRadius:8,fontWeight:600,fontSize:'0.9rem'}}>
            データリセット
          </button>
        </div>
        <p style={{fontSize:'0.75rem',color:'var(--dim)',margin:'8px 0 0'}}>CSVはいつでもダウンロードできます。分析やバックアップにご利用ください。</p>
      </div>
    </div>
  );
}

//  App Root
// ═════════════════════════════

  edit: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>,
  check: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>,

};

function SyncBar() {
  useEffect(() => {
    updateSyncBar('ok');
    const interval = setInterval(() => updateSyncBar('ok'), 30000);
    return () => clearInterval(interval);
  }, []);

  if (!getSyncToken()) return null;

  return (
    <div id="syncBar" className="sync-bar" onClick={onSyncBarTap}>
      <span className="sync-dot-icon"></span>
      <span className="sync-text"></span>
      <span className="sync-refresh-icon">&#x21bb;</span>
    </div>
  );
}

function App() {
  const [page, setPage] = useState('home');
  const [logTab, setLogTab] = useState(null);
  const [logDate, setLogDate] = useState(null);
  const [ready, setReady] = useState(false);

  useEffect(() => {
    DB.initFromGist().finally(() => setReady(true));
  }, []);

  if (!ready) return (
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',color:'#666',fontSize:'0.9rem'}}>
      読み込み中...
    </div>
  );

  function navigate(p, tab, date) {
    setPage(p);
    setLogTab(tab || null);
    setLogDate(date || null);
  }

  const renderPage = () => {
    switch (page) {
      case 'home':     return <Home navigate={navigate}/>;
      case 'log':      return <LogForm initialTab={logTab} initialDate={logDate} key={`log-${logTab||'auto'}-${logDate||''}`}/>;
      case 'todo':     return <TodoPage/>;
      case 'murmur':   return <MurmurPage/>;
      case 'history':  return <HistoryPage/>;
      case 'settings': return <SettingsPage/>;
      default:         return <Home navigate={navigate}/>;
    }
  };

  return (
    <>
      <SyncBar key={page} />
      {renderPage()}
      <nav className="nav-bar">
        <div className="nav-bar-inner">
          {[
            {key:'home',icon:Icons.home,label:'ホーム'},
            {key:'log',icon:Icons.edit,label:'ログ'},
            {key:'murmur',icon:Icons.chat,label:'つぶやき'},
            {key:'todo',icon:Icons.check,label:'ToDo'},
            {key:'history',icon:Icons.clock,label:'履歴'},
            {key:'settings',icon:Icons.settings,label:'設定'},
          ].map(item => (
            <button key={item.key} className={`nav-item ${page===item.key?'active':''}`} onClick={()=>navigate(item.key)}>
              {item.icon}{item.label}
            </button>
          ))}
        </div>
      </nav>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
